<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priotask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Priotask</h1>
        <div id="user-bar" class="hidden">
            <span id="username-display"></span>
            <button id="logout-button">Log out</button>
        </div>
    </header>

    <div id="message-banner" class="hidden"></div>

    <main>
        <section id="auth-section">
            <div class="auth-forms">
                <form id="login-form">
                    <h2>Log in</h2>
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Log in</button>
                </form>

                <form id="register-form">
                    <h2>Register</h2>
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Create account</button>
                </form>
            </div>
        </section>

        <section id="app-section" class="hidden">
            <section id="new-task-section">
                <h2>New task</h2>
                <form id="task-form">
                    <input type="text" name="name" placeholder="Task name" required>
                    <input type="date" name="deadline" required>
                    <input type="number" name="expected_duration_h" placeholder="Effort (hours)" min="0" step="0.5" required>
                    <input type="number" name="importance" placeholder="Importance (1-10)" min="1" max="10" required>
                    <select name="task_type" id="new-task-type-select"></select>
                    <input type="text" name="task_type_new" id="new-task-type-new" class="hidden" placeholder="New type">
                    <select name="task_subtype" id="new-task-subtype-select"></select>
                    <input type="text" name="task_subtype_new" id="new-task-subtype-new" class="hidden" placeholder="New sub-type">
                    <button type="submit">Add task</button>
                </form>
            </section>

            <div class="board">
                <section id="tasks-section">
                    <h2>Your tasks</h2>
                    <div class="task-toolbar">
                        <input type="text" id="task-search" placeholder="Search tasks...">
                        <select id="task-type-filter"></select>
                        <select id="task-subtype-filter"></select>
                        <select id="task-sort">
                            <option value="priority">Sort: priority</option>
                            <option value="deadline">Sort: deadline</option>
                            <option value="type">Sort: type</option>
                        </select>
                        <label class="checkbox-label"><input type="checkbox" id="show-done-checkbox"> Show completed</label>
                    </div>
                    <ul id="task-list"></ul>
                </section>

                <section id="plan-section">
                    <h2>Timetable</h2>
                    <div class="plan-tabs">
                        <button type="button" id="plan-tab-today" class="plan-tab active">Today</button>
                        <button type="button" id="plan-tab-week" class="plan-tab">This week</button>
                    </div>

                    <div id="plan-today-view">
                        <form id="plan-form">
                            <label for="hours-input">Hours available today</label>
                            <input type="number" id="hours-input" min="0" step="0.5" value="6">
                            <button type="submit">Refresh plan</button>
                        </form>
                        <ul id="plan-list"></ul>
                    </div>

                    <div id="plan-week-view" class="hidden">
                        <form id="week-plan-form">
                            <label for="week-hours-input">Hours available per day</label>
                            <input type="number" id="week-hours-input" min="0" step="0.5" value="6">
                            <button type="submit">Refresh week</button>
                        </form>
                        <div id="week-grid"></div>
                    </div>

                    <button id="train-button" type="button">Train priority model</button>
                </section>
            </div>
        </section>
    </main>

    <script>window.PRIOTASK_API_BASE_URL = {{ api_base_url | tojson }};</script>
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
